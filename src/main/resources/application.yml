spring:
  profiles:
    active: ${SPRING_PROFILE:local}
  application:
    name: estoque-ti

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  thymeleaf:
    cache: false

server:
  port: ${SERVER_PORT:8080}

  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
