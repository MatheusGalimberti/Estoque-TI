databaseChangeLog:
  - changeSet:
      id: 202607102043-REPLACE-ESTOQUE-WITH-LOCAL-IN-ITENS
      author: matheus
      changes:
        - dropForeignKeyConstraint:
            baseTableName: itens
            constraintName: fk_itens_estoques

        - dropColumn:
            tableName: itens
            columnName: estoque_atual_id

        - addColumn:
            tableName: itens
            columns:
              - column:
                  name: local_atual_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: itens
            baseColumnNames: local_atual_id
            referencedTableName: locais
            referencedColumnNames: id
            constraintName: fk_itens_locais