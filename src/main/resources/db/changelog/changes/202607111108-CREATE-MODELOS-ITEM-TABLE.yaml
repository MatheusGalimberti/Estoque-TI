databaseChangeLog:
  - changeSet:
      id: 202607111108-CREATE-MODELOS-ITEM-TABLE
      author: matheus
      changes:
        - createTable:
            tableName: modelos_item
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: nome
                  type: VARCHAR(150)
                  constraints:
                    nullable: false

              - column:
                  name: descricao
                  type: VARCHAR(255)

              - column:
                  name: categoria_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: ativo
                  type: BIT
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

              - column:
                  name: criado_em
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: atualizado_em
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: modelos_item
            baseColumnNames: categoria_id
            referencedTableName: categorias
            referencedColumnNames: id
            constraintName: fk_modelos_item_categorias

        - createIndex:
            tableName: modelos_item
            indexName: idx_modelos_item_categoria
            columns:
              - column:
                  name: categoria_id