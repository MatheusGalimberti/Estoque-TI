databaseChangeLog:
  - changeSet:
      id: 202607111140-ADD-MODELO-AND-TIPO-REGISTRO-TO-ITENS
      author: matheus
      changes:
        - dropForeignKeyConstraint:
            baseTableName: itens
            constraintName: fk_itens_categorias

        - dropColumn:
            tableName: itens
            columnName: categoria_id

        - dropColumn:
            tableName: itens
            columnName: nome

        - dropColumn:
            tableName: itens
            columnName: descricao

        - addColumn:
            tableName: itens
            columns:
              - column:
                  name: modelo_item_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: tipo_registro
                  type: VARCHAR(20)
                  defaultValue: UNIDADE
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: itens
            baseColumnNames: modelo_item_id
            referencedTableName: modelos_item
            referencedColumnNames: id
            constraintName: fk_itens_modelos_item

        - createIndex:
            tableName: itens
            indexName: idx_itens_modelo_item
            columns:
              - column:
                  name: modelo_item_id