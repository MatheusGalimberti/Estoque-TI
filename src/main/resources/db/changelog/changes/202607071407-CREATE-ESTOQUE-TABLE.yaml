databaseChangeLog:
  - changeSet:
        id: 202607071407-CREATE-ESTOQUE-TABLE
        author: matheus
        changes:
          - createTable:
              tableName: estoques
              columns:
                - column:
                    name: id
                    type: BIGINT
                    autoIncrement: true
                    constraints:
                      primaryKey: true
                      nullable: false

                - column:
                    name: nome
                    type: VARCHAR(100)
                    constraints:
                      nullable: false

                - column:
                    name: descricao
                    type: VARCHAR(255)

                - column:
                    name: ativo
                    type: BIT
                    defaultValueBoolean: true
                    constraints:
                      nullable: false

                - column:
                    name: criado_em
                    type: TIMESTAMP
                    constraints:
                      nullable: false

                - column:
                    name: atualizado_em
                    type: TIMESTAMP